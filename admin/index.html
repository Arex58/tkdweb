<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Ultimate TKD Owner Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Montserrat", system-ui, sans-serif;
      background: linear-gradient(135deg, #101723, #1c2431);
      color: #fff;
    }
    .portal-card {
      width: min(92vw, 680px);
      padding: 2rem;
      border-radius: 24px;
      background: rgba(255,255,255,0.08);
      box-shadow: 0 18px 45px rgba(0,0,0,0.28);
      backdrop-filter: blur(10px);
    }
    h1 { margin-top: 0; font-size: clamp(2rem, 4vw, 2.75rem); }
    p { line-height: 1.7; color: rgba(255,255,255,0.86); }
    .hint {
      margin-top: 1rem;
      padding: 1rem 1.15rem;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.78);
      font-size: 0.95rem;
    }
    .loading { margin-top: 1rem; font-weight: 700; color: #ffb8bd; }
  </style>
</head>
<body>
  <div class="portal-card">
    <h1>Ultimate TKD Owner Portal</h1>
    <p>
      This page is connected to Decap CMS so the school owners can manage the gallery and
      school news without editing HTML by hand.
    </p>
    <p class="hint">
      Publishing here updates the GitHub repo first. The live website changes after the GitHub/Netlify deploy finishes.
    </p>
    <p class="loading">Loading owner dashboard...</p>
  </div>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.registerPreviewStyle('/styles.css');
    CMS.registerPreviewStyle(`
      :root {
        color-scheme: light;
      }
      html, body {
        margin: 0;
        padding: 0;
        background: #f7f8fb;
        color: #1f2430;
        font-family: "Montserrat", system-ui, sans-serif;
      }
      body {
        padding: 28px;
      }
      .admin-preview-wrap {
        max-width: 1200px;
        margin: 0 auto;
      }
      .admin-preview-section {
        padding: 0 0 2.5rem;
      }
      .admin-preview-section + .admin-preview-section {
        padding-top: 1rem;
      }
      .admin-preview-heading {
        text-align: center;
        margin-bottom: 2rem;
      }
      .admin-preview-heading p:last-child {
        color: #5b6474;
        max-width: 760px;
        margin: 0 auto;
      }
      .admin-preview-empty {
        padding: 1rem 1.15rem;
        border: 1px dashed #d5dae4;
        border-radius: 18px;
        color: #5b6474;
        background: rgba(255,255,255,0.75);
      }
      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1rem;
      }
      @media (max-width: 900px) {
        body {
          padding: 18px;
        }
        .news-grid,
        .gallery-grid {
          grid-template-columns: 1fr;
        }
      }
    `, { raw: true });

    var SiteContentPreview = createClass({
      renderNewsCard: function(item, index) {
        var featured = !!item.get('featured');
        var linkUrl = item.get('linkUrl');
        var linkText = item.get('linkText') || 'Learn More';

        return h(
          'article',
          {
            key: 'news-' + index,
            className: featured ? 'news-card featured-news-card' : 'news-card'
          },
          h('p', { className: 'news-date' }, item.get('label') || ''),
          h('h3', {}, item.get('title') || 'Untitled update'),
          h('p', {}, item.get('summary') || ''),
          linkUrl
            ? h(
                'a',
                {
                  href: '#',
                  className: featured ? 'text-link' : 'btn btn-outline btn-small news-button',
                  onClick: function(event) {
                    event.preventDefault();
                  }
                },
                linkText + ' →'
              )
            : null
        );
      },

      renderGalleryCard: function(item, index, getAsset) {
        var featured = !!item.get('featured') || index === 0;
        var imagePath = item.get('image');
        var asset = imagePath ? getAsset(imagePath) : null;
        var imageSrc = asset ? asset.toString() : '';

        return h(
          'figure',
          {
            key: 'gallery-' + index,
            className: featured ? 'gallery-card gallery-card-large' : 'gallery-card'
          },
          h('img', {
            src: imageSrc,
            alt: item.get('alt') || item.get('title') || 'Gallery photo'
          }),
          item.get('title') ? h('figcaption', {}, item.get('title')) : null
        );
      },

      render: function() {
        var entry = this.props.entry;
        var getAsset = this.props.getAsset;
        var news = entry.getIn(['data', 'news']) || [];
        var gallery = entry.getIn(['data', 'gallery']) || [];
        var newsItems = news.toArray ? news.toArray() : news;
        var galleryItems = gallery.toArray ? gallery.toArray() : gallery;

        return h(
          'div',
          { className: 'admin-preview-wrap' },
          h(
            'section',
            { className: 'admin-preview-section' },
            h(
              'div',
              { className: 'admin-preview-heading' },
              h('p', { className: 'eyebrow' }, 'Upcoming Events'),
              h('h2', {}, 'School News And Important Dates'),
              h('p', {}, 'Keep this section updated so parents and students can quickly see what is coming up.')
            ),
            newsItems.length
              ? h('div', { className: 'news-grid' }, newsItems.map(this.renderNewsCard))
              : h('div', { className: 'admin-preview-empty' }, 'Add a news item to preview the event cards here.')
          ),
          h(
            'section',
            { className: 'admin-preview-section' },
            h(
              'div',
              { className: 'admin-preview-heading' },
              h('p', { className: 'eyebrow' }, 'Gallery'),
              h('h2', {}, 'Photos From The Academy'),
              h('p', {}, 'Uploaded gallery images will preview here using the same card layout style as the live website.')
            ),
            galleryItems.length
              ? h('div', { className: 'gallery-grid' }, galleryItems.map(function(item, index) {
                  return SiteContentPreview.prototype.renderGalleryCard(item, index, getAsset);
                }))
              : h('div', { className: 'admin-preview-empty' }, 'Add a gallery image to preview it here.')
          )
        );
      }
    });

    CMS.registerPreviewTemplate('site_content', SiteContentPreview);
  </script>
</body>
</html>
